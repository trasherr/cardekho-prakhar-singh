name: Build and Deploy cardekho to Production

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Node.js for Angular build
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    # Install Bun if not already installed
    - name: Install Bun
      run: |
        if ! command -v bun &> /dev/null; then
          npm install -g bun
        else
          echo "Bun is already installed."
        fi

    # Install Angular dependencies
    - name: Install frontend dependencies
      working-directory: ./cardekho.web/cardekho.web
      run: npm install

    # (Optional) Inject frontend secrets into a .env file before building
    - name: Create frontend .env file
      working-directory: ./cardekho.web/cardekho.web
      run: echo "API_URL=${{ secrets.API_URL }}" > .env

    # Build Angular app
    - name: Build Angular app
      working-directory: ./cardekho.web/cardekho.web
      run: npm run build -- --configuration=production

    # List built files for debug
    - name: List build files
      run: ls -la ./cardekho.web/cardekho.web/dist

    # ── SCP source code (build artifacts + backend + Dockerfile) ────────
    - name: Copy source to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: ${{ secrets.VM_PORT }}
        # We only copy the built dist folder, the backend folder, and the Dockerfile
        source: "cardekho.api/,cardekho.web/cardekho.web/dist/,Dockerfile"
        target: "/tmp/cardekho-source"
        overwrite: true

    # ── Build + Deploy + Health Check + Rollback ──────────
    - name: Build, deploy and verify on server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: ${{ secrets.VM_PORT }}
        command_timeout: 15m
        script: |
          set -eo pipefail

          SOURCE_DIR="/tmp/cardekho-source"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 1 — PRE-FLIGHT CHECKS
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo "══════════════════════════════════════════"
          echo "  PHASE 1: PRE-FLIGHT CHECKS"
          echo "══════════════════════════════════════════"

          sudo docker --version || { echo "❌ Docker not installed"; exit 1; }

          # Check disk space (require at least 2 GB free)
          AVAILABLE_KB=$(df /var/lib/docker --output=avail | tail -1 | tr -d ' ')
          REQUIRED_KB=2097152
          if [ "$AVAILABLE_KB" -lt "$REQUIRED_KB" ]; then
            echo "⚠️  Low disk space ($(($AVAILABLE_KB / 1024))MB). Running emergency cleanup..."
            sudo docker system prune -af 2>/dev/null || true
            AVAILABLE_KB=$(df /var/lib/docker --output=avail | tail -1 | tr -d ' ')
            if [ "$AVAILABLE_KB" -lt "$REQUIRED_KB" ]; then
              echo "❌ Still only $(($AVAILABLE_KB / 1024))MB free after cleanup. Aborting."
              sudo rm -rf $SOURCE_DIR
              exit 1
            fi
          fi
          echo "✅ Disk space OK — $(($AVAILABLE_KB / 1024))MB free"

          if [ ! -f "$SOURCE_DIR/Dockerfile" ]; then
            echo "❌ Dockerfile not found at $SOURCE_DIR. SCP may have failed."
            exit 1
          fi

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 2 — TAG ROLLBACK IMAGES
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 2: TAGGING ROLLBACK IMAGES"
          echo "══════════════════════════════════════════"

          # Save current working image so we can restore on failure
          sudo docker tag prakharsingh:latest prakharsingh:rollback 2>/dev/null \
            && echo "✅ Tagged prakharsingh:rollback" \
            || echo "ℹ️  No existing image (first deploy?)"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 3 — BUILD IMAGE ON SERVER (Native ARM64)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 3: BUILDING IMAGE ON SERVER"
          echo "══════════════════════════════════════════"

          cd $SOURCE_DIR

          # Build image utilizing local Docker cache
          if ! sudo docker build -t prakharsingh:latest .; then
            echo ""
            echo "❌ BUILD FAILED — old container is still running (no downtime)"
            sudo rm -rf $SOURCE_DIR
            sudo docker rmi prakharsingh:rollback 2>/dev/null || true
            exit 1
          fi
          echo "✅ Image built successfully"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 4 — DEPLOY NEW CONTAINER
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 4: DEPLOYING NEW CONTAINER"
          echo "══════════════════════════════════════════"

          sudo docker stop prakharsingh 2>/dev/null || true
          sudo docker rm prakharsingh 2>/dev/null || true

          sudo docker run -d --name prakharsingh -p 10000:10000 \
            --restart unless-stopped \
            --env-file ~/.env \
            prakharsingh:latest

          echo "✅ Container started"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 5 — HEALTH CHECK & ROLLBACK
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 5: HEALTH CHECK"
          echo "══════════════════════════════════════════"

          MAX_ATTEMPTS=6
          WAIT_SECONDS=5
          HEALTHY=false

          for i in $(seq 1 $MAX_ATTEMPTS); do
            sleep $WAIT_SECONDS
            STATUS=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' prakharsingh 2>/dev/null || echo "not-found")
            
            echo "  Attempt $i/$MAX_ATTEMPTS — status: $STATUS"

            if [ "$STATUS" = "exited" ] || [ "$STATUS" = "not-found" ]; then
              echo "❌ Container crashed — stopping health check early"
              break
            fi

            if [ "$STATUS" = "healthy" ] || { [ "$STATUS" = "running" ] && [ "$i" -eq "$MAX_ATTEMPTS" ]; }; then
              HEALTHY=true
              break
            fi
          done

          if [ "$HEALTHY" = true ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            sudo docker rmi prakharsingh:rollback 2>/dev/null || true
          else
            echo "❌ HEALTH CHECK FAILED — ROLLING BACK"
            sudo docker logs --tail=50 prakharsingh 2>&1 || true
            sudo docker stop prakharsingh 2>/dev/null || true
            sudo docker rm prakharsingh 2>/dev/null || true

            if sudo docker image inspect prakharsingh:rollback >/dev/null 2>&1; then
              echo "Restoring previous image..."
              sudo docker tag prakharsingh:rollback prakharsingh:latest
              sudo docker run -d --name prakharsingh -p 10000:10000 \
                --restart unless-stopped \
                --env-file ~/.env prakharsingh:latest
            fi
            exit 1
          fi

          # Cleanup temp source regardless
          sudo docker image prune -f
          sudo rm -rf $SOURCE_DIR