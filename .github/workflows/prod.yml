name: Build and Deploy cardekho to Production

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install Bun
      run: |
        if ! command -v bun &> /dev/null; then
          npm install -g bun
        else
          echo "Bun is already installed."
        fi

    - name: Install frontend dependencies
      working-directory: ./cardekho.web/cardekho.web
      run: npm install

    - name: Create frontend .env file
      working-directory: ./cardekho.web/cardekho.web
      run: echo "API_URL=${{ secrets.API_URL }}" > .env

    - name: Build Angular app
      working-directory: ./cardekho.web/cardekho.web
      run: npm run build -- --configuration=production

    - name: List build files
      run: ls -la ./cardekho.web/cardekho.web/dist

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker buildx build --platform linux/arm64 -t prakharsingh:latest --load ./

    - name: Save Docker image as tar
      run: docker save prakharsingh:latest -o prakharsingh.tar

    - name: Deploy Docker image to VM
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: ${{ secrets.VM_PORT }}
        source: "prakharsingh.tar"
        target: "/tmp"

    # ── Write API .env directly to VM from GitHub secret ────────────────
    - name: Write API .env to VM
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: ${{ secrets.VM_PORT }}
        script: |
          cat > "$HOME/.env" << 'ENVEOF'
          ${{ secrets.API_ENV_FILE }}
          ENVEOF
          echo "✅ .env written to VM"

    # ── Load + Deploy + Health Check + Rollback ──────────────────────────
    - name: Load, deploy and verify on VM
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        key: ${{ secrets.VM_SSH_KEY }}
        port: ${{ secrets.VM_PORT }}
        command_timeout: 15m
        script: |
          set -eo pipefail

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 1 — PRE-FLIGHT CHECKS
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo "══════════════════════════════════════════"
          echo "  PHASE 1: PRE-FLIGHT CHECKS"
          echo "══════════════════════════════════════════"

          sudo docker --version || { echo "❌ Docker not installed"; exit 1; }

          if [ ! -f "/tmp/prakharsingh.tar" ]; then
            echo "❌ prakharsingh.tar not found in /tmp — SCP may have failed"
            exit 1
          fi
          echo "✅ Image tar present"

          if [ ! -f "$HOME/.env" ]; then
            echo "❌ ~/.env not found — the 'Write API .env to VM' step may have failed"
            exit 1
          fi
          echo "✅ ~/.env present"

          # Check disk space (require at least 2 GB free)
          AVAILABLE_KB=$(df /var/lib/docker --output=avail | tail -1 | tr -d ' ')
          REQUIRED_KB=2097152
          if [ "$AVAILABLE_KB" -lt "$REQUIRED_KB" ]; then
            echo "⚠️  Low disk space ($(($AVAILABLE_KB / 1024))MB). Running emergency cleanup..."
            sudo docker system prune -af 2>/dev/null || true
            AVAILABLE_KB=$(df /var/lib/docker --output=avail | tail -1 | tr -d ' ')
            if [ "$AVAILABLE_KB" -lt "$REQUIRED_KB" ]; then
              echo "❌ Still only $(($AVAILABLE_KB / 1024))MB free after cleanup. Aborting."
              rm -f /tmp/prakharsingh.tar
              exit 1
            fi
          fi
          echo "✅ Disk space OK — $(($AVAILABLE_KB / 1024))MB free"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 2 — TAG ROLLBACK IMAGE
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 2: TAGGING ROLLBACK IMAGE"
          echo "══════════════════════════════════════════"

          sudo docker tag prakharsingh:latest prakharsingh:rollback 2>/dev/null \
            && echo "✅ Tagged prakharsingh:rollback" \
            || echo "ℹ️  No existing image to tag (first deploy?)"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 3 — LOAD NEW IMAGE
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 3: LOADING IMAGE"
          echo "══════════════════════════════════════════"

          if ! sudo docker load -i /tmp/prakharsingh.tar; then
            echo "❌ LOAD FAILED — old container is still running (no downtime)"
            rm -f /tmp/prakharsingh.tar
            sudo docker rmi prakharsingh:rollback 2>/dev/null || true
            exit 1
          fi
          echo "✅ Image loaded successfully"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 4 — DEPLOY NEW CONTAINER
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 4: DEPLOYING NEW CONTAINER"
          echo "══════════════════════════════════════════"

          sudo docker stop prakharsingh 2>/dev/null || true
          sudo docker rm prakharsingh 2>/dev/null || true

          sudo docker run -d --name prakharsingh -p 10000:80 \
            --restart unless-stopped \
            --env-file "$HOME/.env" \
            prakharsingh:latest

          echo "✅ Container started"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # PHASE 5 — HEALTH CHECK & ROLLBACK
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          echo ""
          echo "══════════════════════════════════════════"
          echo "  PHASE 5: HEALTH CHECK"
          echo "══════════════════════════════════════════"

          MAX_ATTEMPTS=6
          WAIT_SECONDS=5
          HEALTHY=false

          for i in $(seq 1 $MAX_ATTEMPTS); do
            sleep $WAIT_SECONDS
            STATUS=$(sudo docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' prakharsingh 2>/dev/null || echo "not-found")

            echo "  Attempt $i/$MAX_ATTEMPTS — status: $STATUS"

            if [ "$STATUS" = "exited" ] || [ "$STATUS" = "not-found" ]; then
              echo "❌ Container crashed — stopping health check early"
              break
            fi

            if [ "$STATUS" = "healthy" ] || { [ "$STATUS" = "running" ] && [ "$i" -eq "$MAX_ATTEMPTS" ]; }; then
              HEALTHY=true
              break
            fi
          done

          if [ "$HEALTHY" = true ]; then
            echo "✅ DEPLOYMENT SUCCESSFUL"
            sudo docker rmi prakharsingh:rollback 2>/dev/null || true
          else
            echo "❌ HEALTH CHECK FAILED — ROLLING BACK"
            sudo docker logs --tail=50 prakharsingh 2>&1 || true
            sudo docker stop prakharsingh 2>/dev/null || true
            sudo docker rm prakharsingh 2>/dev/null || true

            if sudo docker image inspect prakharsingh:rollback >/dev/null 2>&1; then
              echo "Restoring previous image..."
              sudo docker tag prakharsingh:rollback prakharsingh:latest
              sudo docker run -d --name prakharsingh -p 10000:80 \
                --restart unless-stopped \
                --env-file "$HOME/.env" \
                prakharsingh:latest
              echo "⚠️  Rollback complete — previous version restored"
            else
              echo "⚠️  No rollback image available — service is down"
            fi

            exit 1
          fi

          # Cleanup
          sudo docker image prune -f
          rm -f /tmp/prakharsingh.tar